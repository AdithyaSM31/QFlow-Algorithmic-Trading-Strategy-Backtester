databases:
  - name: qflow-db
    databaseName: qflow
    user: qflow
    plan: free

services:
  - type: web
    name: qflow-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qflow-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: qflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: qflow-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: qflow-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: qflow-redis
          property: connectionString


  - type: redis
    name: qflow-redis
    plan: free
    ipAllowList: []
